<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria</title>
</head>
<body>
    <header>
        <h1>Livraria</h1>
    </header>

    <main>
        <h2>Cadastre um livro!</h2>

        <form action="processador.php" method="post">
            <!-- titulo -->
            <label for="titulo">Título do livro:</label>
            <input type="text" name="titulo" id="titulo" required> <br> <br>

            <!-- autor -->
            <label for="autor">Autor do livro:</label>
            <input type="text" name="autor" id="autor" required> <br> <br>

            <!-- preco -->
            <label for="preco">Preço do livro:</label>
            <input type="number" name="preco" id="preco" min="0" step="1" required> <br> <br>

            <!-- botão -->
            <button type="submit">CADASTRAR</button>
        </form>
    </main>
</body>
</html>
