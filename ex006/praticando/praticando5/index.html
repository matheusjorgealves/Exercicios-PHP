<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lan house</title>
</head>
<body>
    <header>
        <h1>Lan house</h1>
    </header>

    <main>
        <form action="processador.php" method="post">
            <!-- nome do produto -->
            <label for="nome">Nome do produto:</label>
            <input type="text" name="nome" id="nome" required> <br> <br>

            <!-- preço do produto -->
            <label for="preco">Preço do profuto:</label>
            <input type="number" name="preco" id="preco" required min="0" step="1"> <br> <br>

            <!-- quantidade -->
            <label for="quantidade">Quantidade em estoque:</label>
            <input type="number" name="quantidade" id="quantidade" min="0" step="1" required> <br> <br>

            <!-- botão -->
            <button type="submit">CADASTRAR PRODUTO</button>
        </form>
    </main>
</body>
</html>
