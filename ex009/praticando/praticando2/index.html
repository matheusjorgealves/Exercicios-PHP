<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Boletim Escolar</title>
</head>
<body>
    <header>
        <h1>Sistema de Boletim Escolar</h1>
    </header>

    <main>
        <h2>Preencha o formulário abaixo!</h2>

        <form action="processador.php" method="post">
            <!-- nome -->
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required>
            <br> <br>

            <!-- n1 -->
            <label for="n1">Nota do 1° semestre:</label>
            <input type="number" name="n1" id="n1" min="0" max="10"
            step="0.5" required>
            <br> <br>

            <!-- n2 -->
            <label for="n2">Nota do 2° semestre:</label>
            <input type="number" name="n2" id="n2" min="0" max="10" step="0.5" required>
            <br> <br>

            <!-- frequencia -->
            <label for="frequencia">Frequência:</label>
            <input type="number" name="frequencia" id="frequencia" min="0" max="100" step="0.1" required>%
            <br> <br>

            <button type="submit">Consultar</button>
            <br> <br>
        </form>
    </main>
</body>
</html>
