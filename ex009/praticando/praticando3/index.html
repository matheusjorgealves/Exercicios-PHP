<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de loja virtual</title>
</head>
<body>
    <header>
        <h1>Sistema de loja virtual</h1>

        <form action="processador.php" method="post">
            <!-- nome -->
            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" required>
            <br> <br>

            <!-- produto -->
            <label for="produto">Produto:</label>
            <input type="text" name="produto" id="produto" required>
            <br> <br>

            <!-- valorProduto -->
            <label for="valorProduto">Valor do produto: R$</label>
            <input type="number" name="valorProduto" id="valorProduto" min="5" max="1000" step="0.50" required>
            <br> <br>

            <!-- quantidade -->
            <label for="quantidade">Quantidade:</label>
            <input type="number" name="quantidade" id="quantidade" min="1" max="100" step="1" required>
            <br> <br>

            <!-- cupom -->
            <label for="cupom">Cupom de desconto?:</label>
            <select name="cupom" id="cupom">
                <option value="sim">SIM</option>
                <option value="nao">NÃO</option>
            </select>
            <br> <br>

            <button type="submit">Comprar</button>
            <br> <br>
        </form>
    </header>
</body>
</html>
