<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
    <!-- Cabeçalho -->
    <header>
        <h1>Preencha os campos abaixo</h1>
    </header>

    <!-- Corpo -->
    <main>
        <form action="processador.php" method="post">
            <h2>Promoção de aniversário</h2>

            <!-- Nome: -->
            <label for="nome">Nome do cliente:</label> <br>
            <input type="text" name="nome" id="nome" required> <br> <br>

            <!-- Valor da compra: -->
            <label for="valor">Valor da compra:</label> <br>
            <input type="number" name="valor" id="valor" required> <br> <br>

            <!-- Forma de pagamento: -->
            <label for="pagamento">Forma de pagamento:</label>
            <div id="pagamento">

                <!-- cartao -->
                <input type="radio" name="pagamento" id="cartao"
                value="cartao" class="pagamento" required>
                <label for="cartao">Cartão de crédito</label> <br> <br>

                <!-- boleto -->
                <input type="radio" name="pagamento" id="boleto"
                value="boleto" class="pagamento" >
                <label for="boleto">Boleto</label> <br> <br>

                <!-- deposito -->
                <input type="radio" name="pagamento" id="deposito"
                value="deposito" class="pagamento" >
                <label for="deposito">Depósito</label>
            </div>

            <!-- Enviar -->
            <div id="button"><button type="submit">Calcular Desconto</button></div>
        </form>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>Site feito por <a href="https://github.com/matheusjorgealves" target="_blank">Matheus Jorge</a></p>
    </footer>

</body>
</html>
